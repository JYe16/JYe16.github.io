<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found</title>
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/adwaita.css">
  <script src="/js/main.js"></script>
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      gap: 16px;
    }
    .error-code {
      font-size: 80px;
      font-weight: 700;
      color: var(--morandi-taupe);
      letter-spacing: -0.04em;
      line-height: 1;
      opacity: 0.6;
    }
    .error-msg {
      font-size: 17px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .error-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      background: var(--accent-subtle);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      transition: all var(--duration-normal) var(--ease-out);
    }
    .error-back:hover {
      background: var(--accent);
      color: var(--bg-card);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <header class="headerbar">
    <div class="headerbar-title"><a href="/">Zhankai Ye</a></div>
    <nav class="headerbar-nav">
      <button id="theme-toggle" class="headerbar-btn theme-toggle" aria-label="Toggle theme"></button>
    </nav>
  </header>

  <main class="main-content">
    <div class="error-page anim-scale-in">
      <div class="error-code">404</div>
      <p class="error-msg">This page doesn't exist. Maybe it was moved.</p>
      <a href="/" class="error-back">← Back to Home</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2022–2026 Zhankai Ye</p>
  </footer>
</body>
</html>
